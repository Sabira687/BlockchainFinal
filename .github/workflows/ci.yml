name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  foundry:
    name: Foundry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge install

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Test
        run: forge test -vvv

      - name: Coverage
        run: forge coverage