name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Run tests
        run: forge test --no-match-path "test/fork/*"

      - name: Run coverage
        run: forge coverage --ir-minimum --no-match-path "test/fork/*" --no-match-coverage "script/*"

  slither:
    name: Slither
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Build
        run: forge build

      - name: Run Slither
        run: slither . --config-file slither.config.json